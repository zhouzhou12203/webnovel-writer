services:
  backend:
    image: ghcr.io/zhouzhou12203/webnovel-writer-backend:latest
    container_name: webnovel-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - AI_BASE_URL=${AI_BASE_URL:-https://api.openai.com/v1}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-gpt-4}
      - EMBED_BASE_URL=${EMBED_BASE_URL:-https://api-inference.modelscope.cn/v1}
      - EMBED_MODEL=${EMBED_MODEL:-Qwen/Qwen3-Embedding-8B}
      - EMBED_API_KEY=${EMBED_API_KEY:-}
      - RERANK_BASE_URL=${RERANK_BASE_URL:-https://api.jina.ai/v1}
      - RERANK_API_KEY=${RERANK_API_KEY:-}
      - RERANK_API_TYPE=${RERANK_API_TYPE:-embedding}
      - WEBNOVEL_DEBUG=${WEBNOVEL_DEBUG:-0}
    volumes:
      - webnovel_home:/root/.webnovel
      - projects_data:/projects

  frontend:
    image: ghcr.io/zhouzhou12203/webnovel-writer-frontend:latest
    container_name: webnovel-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  webnovel_home:
    driver: local
  projects_data:
    driver: local
